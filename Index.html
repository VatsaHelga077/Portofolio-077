<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Pribadi</title>
    <style>
        /* --- KODE CSS --- */
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --primary-color: #4f46e5;
            --secondary-bg: #f3f4f6;
            --card-bg: #ffffff;
            --border-color: #e5e7eb;
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --primary-color: #818cf8;
            --secondary-bg: #1e293b;
            --card-bg: #1e293b;
            --border-color: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        /* Navbar */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background-color: var(--bg-color);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            z-index: 1000;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
        }

        .nav-links {
            display: flex;
            list-style: none;
            align-items: center;
        }

        .nav-links li {
            margin-left: 2rem;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-color);
            font-weight: 500;
        }

        .nav-links a:hover {
            color: var(--primary-color);
        }

        .theme-toggle {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--text-color);
            margin-left: 2rem;
        }

        /* Hero Section */
        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 1rem;
            background: linear-gradient(to bottom, var(--secondary-bg), var(--bg-color));
        }

        header h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        header h1 span {
            color: var(--primary-color);
        }

        header p {
            font-size: 1.2rem;
            max-width: 600px;
            margin-bottom: 2rem;
            color: #64748b;
        }

        [data-theme="dark"] header p {
            color: #94a3b8;
        }

            display: inline-block;
            background-color: var(--primary-color);
            color: white;
